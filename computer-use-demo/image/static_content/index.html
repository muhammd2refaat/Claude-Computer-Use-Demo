<!doctype html>
<html>
    <head>
        <title>Energent AI - Computer Use Agent</title>
        <meta name="permissions-policy" content="fullscreen=*" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                font-family: 'Inter', sans-serif;
            }
            .container {
                display: flex;
                height: 100vh;
                width: 100vw;
            }
            .full-frame {
                flex: 1;
                border: none;
                width: 100%;
                height: 100vh;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <!-- Full-width iframe to the FastAPI frontend at port 8000 -->
            <iframe
                id="app"
                src="http://localhost:8000"
                class="full-frame"
                allow="fullscreen"
            ></iframe>
        </div>
    </body>
</html>
