## Production Docker Compose
## Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
##
## This overlay adds production-specific settings:
## - Logging configuration
## - Resource limits
## - No mounted volumes for code (uses baked-in image)
## - Restart policy

services:
  computer-use:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 2G
    environment:
      - WIDTH=1024
      - HEIGHT=768
      - DISPLAY_NUM=1
      # Override in prod .env or pass via CLI:
      # docker compose ... -e ANTHROPIC_API_KEY=sk-ant-...
